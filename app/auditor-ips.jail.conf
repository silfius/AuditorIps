# /etc/fail2ban/jail.d/auditor-ips.conf
# Jail para Auditor IPs — lee logs Docker via journald

[auditor-ips]
enabled   = true
filter    = auditor-ips
backend   = systemd

# Lee logs del contenedor via journald
# REQUISITO: Docker debe usar log-driver=journald (ver install_fail2ban.sh)
journalmatch = CONTAINER_NAME=auditor_ips

# 5 fallos en 10 minutos -> ban de 1 hora
maxretry  = 5
findtime  = 600
bantime   = 3600

# Nunca banear localhost ni la red local de gestion
ignoreip  = 127.0.0.1/8 ::1 192.168.1.0/24

banaction = iptables-multiport
port      = 8088
protocol  = tcp
