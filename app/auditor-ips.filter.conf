# /etc/fail2ban/filter.d/auditor-ips.conf
# Detecta IPs con multiples 401 en Auditor IPs (logs uvicorn)
[Definition]

# Formato uvicorn:
# INFO:     192.168.1.40:53489 - "POST /api/auth/login HTTP/1.1" 401 Unauthorized
failregex = ^.*\s+<HOST>:\d+ - "(?:GET|POST|PUT|DELETE|PATCH) [^"]+" 401\b.*$

ignoreregex =
datepattern = {^LN-BEG}
