<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ page_title }} — Acceso</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/darkly/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --accent: #4dffb5;
      --accent2: #375a7f;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1d23;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #222831;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 18px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .login-logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1b2a3b, #0d1b2a);
      border: 1px solid rgba(77,255,181,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .login-logo-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0;
      color: #e8eef6;
    }
    .login-logo-text p {
      font-size: .75rem;
      color: rgba(255,255,255,0.4);
      margin: 0;
    }
    .form-label {
      font-size: .82rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: .4rem;
    }
    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #e8eef6;
      padding: .65rem .9rem;
      font-size: .9rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.07);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(77,255,181,0.12);
      color: #e8eef6;
    }
    .btn-login {
      background: var(--accent);
      color: #0b0f14;
      border: none;
      border-radius: 10px;
      padding: .7rem 1.2rem;
      font-weight: 700;
      font-size: .95rem;
      width: 100%;
      transition: opacity .2s, transform .1s;
    }
    .btn-login:hover { opacity: .9; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .error-box {
      background: rgba(255,99,99,0.12);
      border: 1px solid rgba(255,99,99,0.3);
      border-radius: 10px;
      padding: .65rem .9rem;
      font-size: .83rem;
      color: #ff9999;
      display: none;
    }
    .input-group-text {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-right: none;
      color: rgba(255,255,255,0.4);
      border-radius: 10px 0 0 10px;
    }
    .input-group .form-control {
      border-left: none;
      border-radius: 0 10px 10px 0;
    }
    .input-group .form-control:focus { z-index: 1; }
    .pw-toggle {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-left: none;
      color: rgba(255,255,255,0.4);
      border-radius: 0 10px 10px 0;
      cursor: pointer;
    }
    .pw-toggle:hover { color: rgba(255,255,255,0.7); }
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 1.5rem 0;
    }
    .setup-hint {
      background: rgba(77,255,181,0.07);
      border: 1px solid rgba(77,255,181,0.2);
      border-radius: 10px;
      padding: .8rem 1rem;
      font-size: .8rem;
      color: rgba(255,255,255,0.7);
    }
    /* First-time setup accordion */
    .setup-section { display: none; }
    .setup-section.visible { display: block; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0b0f14;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">

  <!-- Logo -->
  <div class="login-logo">
    <div class="login-logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 64 64">
        <circle cx="22" cy="32" r="12" fill="#4dffb5" opacity="0.95"/>
        <path d="M16 32l4 4 8-10" fill="none" stroke="#0b0f14" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="38" y="39" font-family="Arial" font-size="16" font-weight="700" fill="#e8eef6">IP</text>
      </svg>
    </div>
    <div class="login-logo-text">
      <h1>{{ page_title }}</h1>
      <p>Monitor de red local</p>
    </div>
  </div>

  {% if no_users %}
  <!-- ── PRIMER ARRANQUE: crear primer usuario ── -->
  <div class="setup-hint mb-3">
    <i class="bi bi-stars"></i> <strong>Primera configuración</strong><br>
    No hay usuarios admin. Crea el primero para activar la autenticación.
  </div>
  <div id="setupForm">
    <div class="mb-3">
      <label class="form-label">Nombre de usuario</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" id="setupUsername" class="form-control" placeholder="admin" autocomplete="username">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Contraseña <span style="color:rgba(255,255,255,0.35)">(mín. 8 caracteres)</span></label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" id="setupPassword" class="form-control" placeholder="••••••••" autocomplete="new-password">
        <button class="btn pw-toggle" type="button" id="setupPwToggle"><i class="bi bi-eye"></i></button>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Repetir contraseña</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
        <input type="password" id="setupPassword2" class="form-control" placeholder="••••••••" autocomplete="new-password">
      </div>
    </div>
    <div class="error-box mb-3" id="setupError"></div>
    <button class="btn-login" id="setupBtn" type="button">
      <i class="bi bi-shield-check"></i> Crear usuario y entrar
    </button>
  </div>

  {% else %}
  <!-- ── LOGIN NORMAL ── -->
  <div class="mb-3">
    <label class="form-label">Usuario</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-person"></i></span>
      <input type="text" id="loginUsername" class="form-control" placeholder="admin"
             autocomplete="username" autofocus tabindex="1">
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Contraseña</label>
    <div class="input-group">
      <span class="input-group-text"><i class="bi bi-lock"></i></span>
      <input type="password" id="loginPassword" class="form-control" placeholder="••••••••"
             autocomplete="current-password" tabindex="2">
      <button class="btn pw-toggle" type="button" id="pwToggle" tabindex="-1"><i class="bi bi-eye"></i></button>
    </div>
  </div>

  <div class="error-box mb-3" id="loginError"></div>

  <button class="btn-login" id="loginBtn" type="button" tabindex="3">
    <i class="bi bi-box-arrow-in-right"></i> Entrar
  </button>
  {% endif %}

</div>

<script>
const NEXT = {{ next | tojson }};

{% if no_users %}
// ── Setup primer usuario ──────────────────────────────────
document.getElementById('setupPwToggle').addEventListener('click', function() {
  const inp = document.getElementById('setupPassword');
  const vis = inp.type === 'text';
  inp.type = vis ? 'password' : 'text';
  this.innerHTML = vis ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
});

async function doSetup() {
  const username = document.getElementById('setupUsername').value.trim();
  const pw       = document.getElementById('setupPassword').value;
  const pw2      = document.getElementById('setupPassword2').value;
  const errEl    = document.getElementById('setupError');
  const btn      = document.getElementById('setupBtn');
  errEl.style.display = 'none';

  if (!username) { errEl.textContent = 'Introduce un nombre de usuario'; errEl.style.display='block'; return; }
  if (pw.length < 8) { errEl.textContent = 'La contraseña debe tener al menos 8 caracteres'; errEl.style.display='block'; return; }
  if (pw !== pw2) { errEl.textContent = 'Las contraseñas no coinciden'; errEl.style.display='block'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creando…';

  try {
    // Create user
    const r1 = await fetch('/api/auth/users', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password: pw})
    });
    const d1 = await r1.json();
    if (!d1.ok) { errEl.textContent = d1.error; errEl.style.display='block'; btn.disabled=false; btn.innerHTML='<i class="bi bi-shield-check"></i> Crear usuario y entrar'; return; }

    // Auto-login
    const r2 = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password: pw})
    });
    const d2 = await r2.json();
    if (d2.ok) { window.location.href = NEXT || '/'; }
    else { errEl.textContent = d2.error; errEl.style.display='block'; btn.disabled=false; }
  } catch(e) {
    errEl.textContent = 'Error de red'; errEl.style.display='block'; btn.disabled=false;
    btn.innerHTML = '<i class="bi bi-shield-check"></i> Crear usuario y entrar';
  }
}

document.getElementById('setupBtn').addEventListener('click', doSetup);
['setupUsername','setupPassword','setupPassword2'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doSetup(); });
});

{% else %}
// ── Login normal ──────────────────────────────────────────
document.getElementById('pwToggle').addEventListener('click', function() {
  const inp = document.getElementById('loginPassword');
  const vis = inp.type === 'text';
  inp.type = vis ? 'password' : 'text';
  this.innerHTML = vis ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
});

async function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');
  errEl.style.display = 'none';

  if (!username || !password) {
    errEl.textContent = 'Introduce usuario y contraseña';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Comprobando…';

  try {
    const r    = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await r.json();
    if (data.ok) {
      btn.innerHTML = '<i class="bi bi-check-lg"></i> Correcto';
      window.location.href = NEXT || '/';
    } else {
      errEl.textContent = data.error || 'Credenciales incorrectas';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Entrar';
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginPassword').focus();
    }
  } catch(e) {
    errEl.textContent = 'Error de red';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Entrar';
  }
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('loginUsername').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === 'Tab') {
    if (e.key === 'Tab') return; // leave native tab handling
    e.preventDefault();
    document.getElementById('loginPassword').focus();
  }
});
document.getElementById('loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// Ensure username field gets focus on load
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    const u = document.getElementById('loginUsername');
    if (u) { u.focus(); u.select(); }
  }, 150);
});
{% endif %}
</script>
</body>
</html>
